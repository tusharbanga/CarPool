<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script> 
    <style>
        body {
            background: linear-gradient(to bottom right, #0f172a, #1e293b);
            color: #e2e8f0;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 20px;
        }

        .rider-info p {
            margin-bottom: 8px;
        }

        .rider-info strong {
            color: #60a5fa;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4caf50;
            color: #fff;
            font-weight: 600;
            border-radius: 30px;
            text-align: center;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container py-10">
    <h1>Booking Details</h1>

    <div class="card">
        <div class="rider-info">
            <p><strong>Rider:</strong> Aarav Sharma</p>
            <p><strong>Pickup:</strong> Gurugram, Sector 46</p>
            <p><strong>Destination:</strong> YMCA, Faridabad</p>
            <p><strong>Date:</strong> 17 Nov 2024</p>
            <p><strong>Time:</strong> 2:30 PM</p>
        </div>
        <div class="text-center">
            <a href="index.html" class="btn">Back to Bookings</a>
        </div>
    </div>
</div>

</body>
</html>
