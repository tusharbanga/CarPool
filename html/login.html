<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.C. Bose University Carpooling Login</title>
    <link rel="stylesheet" href="../css/login_style.css">
    <script src="https://kit.fontawesome.com/97ebdf5864.js" crossorigin="anonymous"></script>
</head>
<body class="login-page">
    <div class="container">
        <img src="https://jcboseust.ac.in/../assets/uploads/media/be5cb2dc7f8445c5b3dc7d814be25bc9.png" alt="J.C. Bose University Logo" class="logo">
        <h2>Carpooling Platform Login</h2>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" required>
                <label for="email">Email</label>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" required>
                <label for="password">Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <p><input type="checkbox"> Remember Me <a href="#">Forgot Password?</a></p>

            <input id="btn" type="submit" value="Login">

            <p>Don't have an account? <a href="register.html">Register</a></p>
            <p id="error-message" style="color: red;"></p>
        </form>
    </div>

    <script src="../js/login_script.js"></script>
</body>
</html>
