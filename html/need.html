<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Help Page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/../js/all.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .emergency-card {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 550px;
            animation: fadeIn 1.5s ease-in-out;
            transform: translateY(-10px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container button {
            transition: all 0.3s ease-in-out;
            transform: perspective(1px) translateZ(0);
            backface-visibility: hidden;
            position: relative;
            overflow: hidden;
        }

        .button-container button:before {
            content: "";
            position: absolute;
            z-index: -1;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0));
            transition: all 0.4s ease-in-out;
        }

        .button-container button:hover:before {
            left: 100%;
        }

        .popup {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #38bdf8;
            color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            opacity: 0;
            animation: fadePopup 1s forwards;
        }

        @keyframes fadePopup {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.2rem;
            }
        }

        #panicButton {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: red;
            border-radius: 50%;
            bottom: 20px;
            right: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 0.7;
            display: none;
        }

        #panicButton:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="emergency-card p-4 sm:p-6 text-gray-800 shadow-xl text-center rounded-lg bg-opacity-80">

        <h1 class="text-3xl font-bold mb-4 text-black">Emergency Assistance</h1>
        <p class="text-black mb-6">Set your emergency contacts below, or call emergency services instantly.</p>

        <div class="mb-6 bg-white p-4 rounded-lg shadow-lg transform hover:scale-105 transition-transform duration-300">
            <h2 class="text-xl font-semibold mb-4">Set Emergency Contacts</h2>
            <div class="space-y-4">
                <input type="tel" id="contact1" placeholder="Emergency Contact 1" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                <input type="text" id="nickname1" placeholder="Nickname (e.g., Mom)" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                <input type="tel" id="contact2" placeholder="Emergency Contact 2" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                <input type="text" id="nickname2" placeholder="Nickname (e.g., Friend)" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                <button onclick="saveContacts()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition duration-300">
                    <i class="fas fa-save mr-2"></i> Save Contacts
                </button>
            </div>
        </div>

        <div class="button-container flex flex-col space-y-3 mt-6">
            <button onclick="callContact(1)" class="flex items-center justify-center bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">
                <i class="fas fa-phone-alt mr-2"></i> Call Contact 1
            </button>
            <button onclick="callContact(2)" class="flex items-center justify-center bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">
                <i class="fas fa-phone-alt mr-2"></i> Call Contact 2
            </button>
            <button id="shareLocationBtn" class="flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">
                <i class="fas fa-map-marker-alt mr-2"></i> Share Location
            </button>
        </div>

        <div class="mt-8 bg-white p-4 rounded-lg shadow-lg transform hover:scale-105 transition-transform duration-300">
            <h2 class="text-xl font-semibold mb-4">Emergency Services Contacts</h2>
            <div class="space-y-2">
                <p><i class="fas fa-phone-alt text-pink-500"></i> Women Helpline: <a href="tel:1091" class="text-blue-600 hover:underline">1091</a></p>
                <p><i class="fas fa-phone-alt text-pink-500"></i> Ambulance: <a href="tel:108" class="text-blue-600 hover:underline">108</a></p>
                <p><i class="fas fa-phone-alt text-pink-500"></i> Police Helpline: <a href="tel:100" class="text-blue-600 hover:underline">100</a></p>
            </div>
        </div>
    </div>

    <div id="popup" class="popup">Contacts saved successfully!</div>

    <div id="panicButton" onclick="triggerPanicAlert()"></div>

    <script>
        function saveContacts() {
            const contact1 = document.getElementById('contact1').value;
            const nickname1 = document.getElementById('nickname1').value || "Contact 1";
            const contact2 = document.getElementById('contact2').value;
            const nickname2 = document.getElementById('nickname2').value || "Contact 2";

            if (contact1 && contact2) {
                localStorage.setItem('emergencyContact1', JSON.stringify({ number: contact1, nickname: nickname1 }));
                localStorage.setItem('emergencyContact2', JSON.stringify({ number: contact2, nickname: nickname2 }));
                showPopup("Contacts saved successfully!");
            } else {
                alert("Please enter both contacts.");
            }
        }

        function showPopup(message) {
            const popup = document.getElementById('popup');
            popup.textContent = message;
            popup.style.display = 'block';
            setTimeout(function () {
                popup.style.display = 'none';
            }, 3000);
        }

        function callContact(contactNumber) {
            const contact = JSON.parse(localStorage.getItem(`emergencyContact${contactNumber}`));
            if (contact) {
                if (confirm(`Call ${contact.nickname || 'Contact'} at ${contact.number}?`)) {
                    window.location.href = `tel:${contact.number}`;
                }
            } else {
                showPopup('Contact not found.');
            }
        }

        let locationInterval;
        document.getElementById('shareLocationBtn').addEventListener('click', function () {
            navigator.geolocation.getCurrentPosition(function (position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                locationInterval = setInterval(function () {
                    const locationUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    alert('Sharing live location: ' + locationUrl);
                }, 30000);
            }, function () {
                alert('Unable to retrieve location.');
            });
        });

        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = function () {
                console.log("Voice recognition started");
            };

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                if (transcript.includes("i need help") || transcript.includes("please help me")) {
                    alert("Emergency alert triggered! Sharing location...");
                    document.getElementById('shareLocationBtn').click(); // Trigger location sharing
                }
            };

            recognition.onerror = function (event) {
                console.error("Speech recognition error", event.error);
            };

            document.body.addEventListener('click', function () {
                recognition.start();
            });
        } else {
            alert('Speech recognition not supported in this browser.');
        }

        let pressTimer;
        document.body.addEventListener('touchstart', function (e) {
            pressTimer = setTimeout(function () {
                triggerPanicAlert();
            }, 1000); 
        });

        document.body.addEventListener('touchend', function () {
            clearTimeout(pressTimer); 
        });

        function triggerPanicAlert() {
            alert("Panic alert triggered!");
            const contact = JSON.parse(localStorage.getItem('emergencyContact1'));
            if (contact) {
                alert(`Silent alert sent to ${contact.nickname || 'Contact'} at ${contact.number}`);
            }
        }
    </script>

</body>

</html>
