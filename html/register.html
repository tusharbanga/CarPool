<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - J.C. Bose University Carpooling Platform</title>
    <link rel="stylesheet" href="../css/register_style.css">
</head>
<body class="registration-page">
    <div class="background-image"></div>
    <div class="container">
        <div class="card">
            <div class="logo-container">
                <img src="https://jcboseust.ac.in/../assets/uploads/media/be5cb2dc7f8445c5b3dc7d814be25bc9.png" alt="J.C. Bose University Logo" class="logo" />
            </div>
            <h1>J.C. Bose University Carpooling Platform</h1>
            <form id="registrationForm" class="registration-form">
                <label for="Name">Name:</label>
                <input type="text" id="Name" name="Name" required>

                <label for="roll-number">University Roll Number:</label>
                <input type="text" id="roll-number" name="roll-number" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="Password">Password:</label>
                <div class="password-container">
                    <input type="password" id="Password" name="Password" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>
                </div>

                <label for="mobile">Mobile Number:</label>
                <input type="text" id="mobile" name="mobile" required>

                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>

                <label for="course">Course:</label>
                <input type="text" id="course" name="course" required>

                <label for="year">Year:</label>
                <input type="text" id="year" name="year" required>

                <label for="semester">Semester:</label>
                <input type="text" id="semester" name="semester" required>

                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
        <div id="popup" class="popup" style="display: none;">
            <div class="popup-content">
                <h2>Registration Successful!</h2>
                <p>You have successfully registered.</p>
            </div>
        </div>
    <script src="../js/register_script.js"></script>

</body>
</html>
