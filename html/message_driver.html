<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver-Rider Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom right, #4f46e5, #9333ea);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .online {
            background-color: #34d399;
        }

        .offline {
            background-color: #f87171;
        }

        .chat-bubble {
            padding: 12px 18px;
            border-radius: 25px;
            max-width: 80%;
            margin-bottom: 12px;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        .chat-bubble.driver {
            background: linear-gradient(to right, #6366f1, #4f46e5);
            color: white;
            align-self: flex-end;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
        }

        .chat-bubble.rider {
            background: linear-gradient(to right, #facc15, #fbbf24);
            color: white;
            align-self: flex-start;
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.4);
        }

        .double-tick {
            position: absolute;
            bottom: -5px;
            right: 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .double-tick span {
            margin-left: 5px;
            color: #4caf50;
        }

        .typing-indicator {
            font-size: 14px;
            font-style: italic;
            color: #888;
            animation: fadeInOut 2s infinite;
        }

        .button:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex justify-between items-center bg-gradient-to-r from-indigo-500 to-purple-600 p-4 text-white">
            <div class="text-xl font-semibold">Driver Chat UI</div>
            <div class="flex items-center space-x-2">
                <span>Rider:</span>
                <div id="statusDot" class="status-dot online"></div>
                <span id="statusText">Online</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-gray-100" id="chatContainer">
        </div>

        <div id="typingIndicator" class="p-2 bg-gray-50 text-center hidden typing-indicator">
            Rider is typing...
        </div>

        <div class="p-4 bg-gray-200">
            <div class="text-center font-medium text-gray-700 mb-3">
                Current Fare: <span id="fareDisplay">₹300</span>
            </div>
            <div class="flex justify-between space-x-2">
                <button class="button bg-green-500 text-white px-4 py-2 rounded-full" onclick="acceptFare()">Accept</button>
                <button class="button bg-red-500 text-white px-4 py-2 rounded-full" onclick="declineFare()">Decline</button>
                <select
                    id="counterSelect"
                    class="button bg-yellow-500 text-white px-4 py-2 rounded-full"
                    onchange="counterOffer(this.value)">
                    <option value="">Counter Offer</option>
                    <option value="10">+₹10</option>
                    <option value="20">+₹20</option>
                    <option value="30">+₹30</option>
                    <option value="40">+₹40</option>
                    <option value="50">+₹50</option>
                </select>
            </div>
        </div>

        <div class="flex items-center p-4 border-t bg-gray-50">
            <input
                id="messageInput"
                type="text"
                class="flex-1 border rounded-full px-4 py-2 text-gray-700 focus:outline-none"
                placeholder="Type a message..."
            />
            <button
                class="ml-3 bg-indigo-500 text-white px-5 py-2 rounded-full font-semibold"
                onclick="sendMessage()">Send</button>
        </div>
    </div>

    <audio id="notificationSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
    <audio id="sendSound" src="https://www.soundjay.com/button/beep-01a.wav"></audio>

    <script>
        let messages = [];
        let riderMessages = [
            "Hi, how much is the fare for my ride?",
            "Can we negotiate with the fare?",
        ];
        let currentFare = 300;

        function toggleRiderStatus() {
            let isRiderOnline = document.getElementById("statusDot").classList.contains("online");
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");
            if (isRiderOnline) {
                statusDot.classList.replace("online", "offline");
                statusText.textContent = "Offline";
            } else {
                statusDot.classList.replace("offline", "online");
                statusText.textContent = "Online";
            }
        }

        function simulateTyping() {
            const typingIndicator = document.getElementById("typingIndicator");
            typingIndicator.classList.remove("hidden");
            setTimeout(() => {
                typingIndicator.classList.add("hidden");
            }, 2000);
        }

        function playNotificationSound() {
            const sound = document.getElementById("notificationSound");
            sound.play();
        }

        function playSendSound() {
            const sound = document.getElementById("sendSound");
            sound.play();
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;

            messages.push({ sender: "driver", text, read: false });
            input.value = "";
            renderMessages();
            playSendSound();
            simulateRiderResponse();
        }

        function simulateRiderResponse() {
            if (riderMessages.length === 0) return;
            setTimeout(() => {
                const riderText = riderMessages.shift();
                messages.push({ sender: "rider", text: riderText, read: false });
                playNotificationSound();
                renderMessages();
            }, 1500);
        }

        function renderMessages() {
            const chatContainer = document.getElementById("chatContainer");
            chatContainer.innerHTML = "";
            messages.forEach(msg => {
                const bubble = document.createElement("div");
                bubble.className = `chat-bubble ${msg.sender}`;
                bubble.innerHTML = `${msg.text}<div class="double-tick"><span>✓✓</span></div>`;
                chatContainer.appendChild(bubble);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function acceptFare() {
            document.getElementById("fareDisplay").textContent = `₹${currentFare}`;
        }

        function declineFare() {
            document.getElementById("fareDisplay").textContent = "Fare Declined";
        }

        function counterOffer(amount) {
            if (amount) {
                currentFare += parseInt(amount);
                document.getElementById("fareDisplay").textContent = `₹${currentFare}`;
            }
        }
    </script>
</body>
</html>
